<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="stylesheet" href="loginstyle.css">
    <script src="assets/js/auth.js" defer></script>
    <script src="assets/js/li.js" defer></script>
</head>
<body>
    <form class="form1" id="form1">
        <h2>LOGIN</h2><br>
        <label for="loginUsername" id="lab1">USERNAME:</label><br>
        <input type="text" class="logininput" id="loginUsername" placeholder="USERNAME" required><br><br>
        <label for="loginPassword" id="lab2">PASSWORD:</label><br>
        <input type="password" class="logininput" id="loginPassword" placeholder="PASSWORD" required>
        <button type="button" class="toggle-password" data-target="#loginPassword">Show</button><br><br>
        <button type="button" id="loginBtn">LOGIN</button><br><br>&nbsp;&nbsp;
        <p>New User?<a href="signin.html" id="create">create account</a></p>
    </form>
</body>
</html>
