<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN IN</title>
    <link rel="stylesheet" href="signinstyle.css">
    <script src="assets/js/auth.js" defer></script>
    <script src="assets/js/si.js" defer></script>
</head>
<body>
    <form class="form1" id="form1">
        <h2>SIGN IN</h2>
        <label for="signupUsername" id="lab1">USERNAME:</label><br>
        <input type="text" class="logininput" id="signupUsername" placeholder="USERNAME" required><br><br>
        <label for="signupPassword" id="lab2">PASSWORD:</label><br>
        <input type="password" class="logininput" id="signupPassword" placeholder="PASSWORD" required>
        <button type="button" class="toggle-password" data-target="#signupPassword">Show</button><br><br>
        <button type="button" id="createAccountBtn">CREATE ACCOUNT</button><br><br>&nbsp;&nbsp;
        <p>Already have an account?<a href="login.html" id="create">Login</a></p>
    </form>
</body>
</html>
